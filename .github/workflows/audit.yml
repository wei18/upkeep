name: upkeep audit
on:
  workflow_call:
    inputs:
      model:
        type: string
        default: claude-opus-4-8
      max_turns:
        type: string
        default: '30'
      issue_label:
        type: string
        default: audit
      rubric_lang:
        type: string
        default: en   # reviewer rubric / prompt language: en | zh-TW | ...
    secrets:
      claude_code_oauth_token:
        required: true

permissions:
  contents: read
  issues: write
  id-token: write   # claude-code-action mints a GitHub OIDC token

jobs:
  discovery:
    runs-on: ubuntu-latest
    outputs:
      reviewers: ${{ steps.d.outputs.reviewers }}
    steps:
      - uses: actions/checkout@v6
      - id: d
        uses: wei18/upkeep/.github/actions/discovery@v2

  review:
    needs: discovery
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        reviewer: ${{ fromJSON(needs.discovery.outputs.reviewers) }}
    steps:
      - uses: actions/checkout@v6
      - uses: wei18/upkeep/.github/actions/reviewer@v2
        with:
          reviewer: ${{ matrix.reviewer }}
          model: ${{ inputs.model }}
          max_turns: ${{ inputs.max_turns }}
          rubric_lang: ${{ inputs.rubric_lang }}
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          github_token: ${{ github.token }}

  synthesis:
    needs: review
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: wei18/upkeep/.github/actions/synthesis@v2
        with:
          model: ${{ inputs.model }}
          max_turns: ${{ inputs.max_turns }}
          rubric_lang: ${{ inputs.rubric_lang }}
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          github_token: ${{ github.token }}

  report:
    needs: synthesis
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: wei18/upkeep/.github/actions/report@v2
        with:
          issue_label: ${{ inputs.issue_label }}
          github_token: ${{ github.token }}
